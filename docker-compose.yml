services:
  app:
    # Imagem construída e publicada pelo GitHub Actions — nunca buildar localmente em produção.
    # Para desenvolvimento local use: docker build -t pelada-draft-frontend . && docker run ...
    image: ghcr.io/afmdaniel/pelada-draft-frontend:latest
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3001/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
