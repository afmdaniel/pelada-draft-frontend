services:
  app:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* são baked-in em build time — não altere sem rebuild
        # Com network_mode: host, localhost dentro do container = localhost da máquina host
        NEXT_PUBLIC_API_URL: http://localhost:3000
    # network_mode: host no Linux faz localhost do container apontar para a máquina host,
    # eliminando a necessidade de host.docker.internal e port mapping.
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3001/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
